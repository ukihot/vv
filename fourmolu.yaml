# インデント幅
indentation: 4

# 1行の最大文字数
column-limit: 100

# 型クラスの制約が1つの場合に括弧を付けない
single-constraint-parens: never

# 関数の矢印スタイル
function-arrows: trailing

# カンマの位置
comma-style: leading

# import の整形
import-export-style: diff-friendly

# let / in の配置
indent-wheres: true

# record のブレーク
record-brace-space: true

# 言語拡張をアルファベット順にソートする
sort-extensions: true

# import 句をアルファベット順にソートする
sort-imports: true

# 冗長な括弧を削除する
simplify-parentheses: true

# newtype/derivingの扱い
respectful: true

# Explicitly tell fourmolu to read cabal file
cabal: true